name: Daily Dashboard Automation

on:
  schedule:
    # Run daily at 11:15 UTC (3:15 PM Dubai time)
    # Adjust the time if needed: change '15 11' to your preferred 'minute hour'
    - cron: '15 11 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      # Check out the latest code
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'
      
      # Install dependencies with verbose output
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy numpy-financial requests --verbose
          echo "✅ Dependencies installed successfully"
      
      # Set environment variables for paper account
      - name: Set environment variables
        run: |
          echo "IBKR_FLEX_TOKEN_PAPER=${{ secrets.IBKR_FLEX_TOKEN_PAPER }}" >> $GITHUB_ENV
          echo "IBKR_FLEX_QUERY_ID_PAPER=${{ secrets.IBKR_FLEX_QUERY_ID_PAPER }}" >> $GITHUB_ENV
          echo "PAPER_ACCOUNT_ID=${{ secrets.PAPER_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "✅ Environment variables set"
      
      # Run Flex pull for PAPER account ONLY
      - name: Pull IBKR Flex data (Paper Trading)
        run: |
          echo "Starting Flex pull..."
          python3 scripts/ibkr_flex_pull_paper.py || echo "⚠️ Flex pull encountered an issue (this is normal if IBKR is offline)"
      
      # Aggregate positions from daily Flex pull
      - name: Aggregate positions
        run: |
          echo "Aggregating positions..."
          python3 scripts/paper_account_aggregator.py || echo "⚠️ No new data to aggregate"
      
      # Calculate XIRR metrics
      - name: Calculate XIRR metrics
        run: |
          echo "Calculating XIRR..."
          python3 scripts/xirr_calculator.py
      
      # Update dashboard
      - name: Update dashboard
        run: |
          echo "Updating dashboard..."
          python3 scripts/dashboard_automation.py
      
      # Commit and push changes
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Dashboard Automation"
          git add docs/index.html DASHBOARD_AUDIT.md 2>/dev/null || true
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "📊 Automated dashboard update - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Changes pushed to GitHub"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

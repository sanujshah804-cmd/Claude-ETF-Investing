name: Daily Dashboard Automation

on:
  schedule:
    # Run daily at 11:15 UTC (3:15 PM Dubai time, UTC+4)
    - cron: '15 11 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

# Explicit permissions: only what is needed
permissions:
  contents: write   # needed to commit + push docs/index.html and data files

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy numpy-financial requests
          echo "✅ Dependencies installed"

      # ── 4. Pull IBKR Flex data (PAPER account only) ────────────────────────
      # Credentials come from GitHub Secrets — no .env file needed.
      # Live account credentials are NOT present here (Chinese wall).
      - name: Pull IBKR Flex data (Paper account only)
        env:
          IBKR_FLEX_TOKEN_PAPER:    ${{ secrets.IBKR_FLEX_TOKEN_PAPER }}
          IBKR_FLEX_QUERY_ID_PAPER: ${{ secrets.IBKR_FLEX_QUERY_ID_PAPER }}
          PAPER_ACCOUNT_ID:         ${{ secrets.PAPER_ACCOUNT_ID }}
        run: |
          echo "Pulling paper account Flex statement..."
          python3 scripts/ibkr_flex_pull_paper.py \
            || echo "⚠️  Flex pull failed (IBKR offline or market holiday). Continuing with last known data."

      # ── 5. Aggregate positions ─────────────────────────────────────────────
      - name: Aggregate positions & update ledger
        run: |
          echo "Parsing positions and updating performance ledger..."
          python3 scripts/paper_account_aggregator.py \
            || echo "⚠️  Aggregation skipped (no new XML). Continuing with last known data."

      # ── 6. Calculate XIRR / metrics ───────────────────────────────────────
      - name: Calculate XIRR metrics
        run: |
          echo "Calculating XIRR and performance metrics..."
          python3 scripts/xirr_calculator.py

      # ── 7. Generate dashboard HTML (embed data, write both HTML files) ─────
      - name: Generate dashboard
        run: |
          echo "Generating dashboard HTML with embedded data..."
          python3 scripts/dashboard_automation.py

      # ── 8. Commit and push updated files ──────────────────────────────────
      - name: Commit and push updated dashboard
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Dashboard Automation"

          # Stage all files that change with each daily update
          git add \
            docs/index.html \
            index.html \
            reports/paper/performance_ledger_paper.json \
            reports/paper/dashboard_metrics.json \
            reports/paper/cost_basis_paper.json \
            2>/dev/null || true

          # Only commit when something actually changed
          if git diff --cached --quiet; then
            echo "ℹ️  No changes detected — dashboard already up to date"
          else
            git commit -m "📊 Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ Dashboard pushed to GitHub"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
